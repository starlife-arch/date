<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Enter Invite Code — DateVault</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div class="page-loader" id="loader"><div class="loader-logo">DateVault</div></div>
  <div class="status-page">
    <div class="auth-logo" style="font-size:1.25rem;margin-bottom:0.25rem;">DateVault</div>
    <div style="color:var(--success);font-size:3rem;margin-bottom:0.5rem;">✓</div>
    <h2>Verification Approved</h2>
    <p>Congratulations! Your identity has been verified. Enter your invite code below to continue to membership.</p>
    <div style="width:100%;max-width:360px;">
      <div id="errorMsg" style="display:none;background:rgba(224,92,110,0.1);border:1px solid rgba(224,92,110,0.3);color:var(--danger);padding:0.75rem 1rem;border-radius:12px;font-size:13px;margin-bottom:1rem;text-align:center;"></div>
      <input type="text" id="inviteInput" placeholder="INV-XXXXXXX" style="text-align:center;font-family:'Cormorant Garamond',serif;font-size:1.2rem;letter-spacing:0.1em;margin-bottom:0.75rem;" maxlength="12"/>
      <button class="btn btn-gold btn-full" id="verifyBtn" onclick="verifyCode()">Verify Access</button>
    </div>
    <p class="muted" style="font-size:12px;">Your invite code was sent to your email upon approval.</p>
    <button class="btn btn-outline btn-sm" onclick="doLogout()">Sign Out</button>
  </div>

  <script type="module">
    import { auth, db, onAuthStateChanged } from "./js/auth.js";
    import { getDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    let currentUser = null;

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'login.html'; return; }
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (!snap.exists() || snap.data().status !== 'approved_pending_invite') {
        const { routeUser } = await import('./js/auth.js');
        routeUser(user); return;
      }
      currentUser = user;
      document.getElementById('loader').classList.add('hidden');
    });

    window.verifyCode = async function() {
      const code = document.getElementById('inviteInput').value.trim().toUpperCase();
      const btn = document.getElementById('verifyBtn');
      const err = document.getElementById('errorMsg');
      err.style.display = 'none';

      if (!code) { showErr('Please enter your invite code.'); return; }
      btn.disabled = true; btn.textContent = 'Verifying...';

      try {
        const snap = await getDoc(doc(db, 'users', currentUser.uid));
        const data = snap.data();

        if (data.inviteCode !== code) { showErr('Invalid invite code. Please check and try again.'); btn.disabled=false; btn.textContent='Verify Access'; return; }
        if (data.inviteUsed) { showErr('This invite code has already been used.'); btn.disabled=false; btn.textContent='Verify Access'; return; }

        await updateDoc(doc(db, 'users', currentUser.uid), {
          inviteUsed: true,
          status: 'approved_pending_payment'
        });
        window.location.href = 'payment.html';
      } catch(e) {
        showErr('Error: ' + e.message);
        btn.disabled = false; btn.textContent = 'Verify Access';
      }
    };

    function showErr(msg) {
      const err = document.getElementById('errorMsg');
      err.textContent = msg; err.style.display = 'block';
    }

    window.doLogout = async function() {
      const { logout } = await import('./js/auth.js');
      logout();
    };
  </script>
</body>
</html>
