<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — DateVault</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div class="page-loader" id="loader"><div class="loader-logo">DateVault</div></div>
  <div class="auth-shell">
    <div class="auth-card fade-up">
      <a href="index.html" style="display:flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;margin-bottom:1.5rem;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Back
      </a>
      <div class="auth-logo">DateVault</div>
      <p class="auth-tagline">Welcome back</p>
      <div id="errorMsg" style="display:none;background:rgba(224,92,110,0.1);border:1px solid rgba(224,92,110,0.3);color:var(--danger);padding:0.75rem 1rem;border-radius:12px;font-size:13px;margin-bottom:1rem;"></div>
      <div class="field-group">
        <div>
          <label>Email Address</label>
          <input type="email" id="email" placeholder="your@email.com"/>
        </div>
        <div>
          <label>Password</label>
          <input type="password" id="password" placeholder="Your password"/>
        </div>
        <button class="btn btn-gold btn-full" id="loginBtn" onclick="doLogin()">Sign In</button>
      </div>
      <p class="auth-footer">Don't have an account? <a href="signup.html">Apply for membership</a></p>
    </div>
  </div>

  <script type="module">
    import { login, auth, onAuthStateChanged, routeUser } from "./js/auth.js";

    onAuthStateChanged(auth, user => {
      if (user) routeUser(user);
      else document.getElementById('loader').classList.add('hidden');
    });

    window.doLogin = async function() {
      const email = document.getElementById('email').value.trim();
      const pw = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errorMsg');
      err.style.display = 'none';

      if (!email || !pw) { showErr('Please fill in all fields.'); return; }
      btn.disabled = true; btn.textContent = 'Signing in...';
      try {
        const user = await login(email, pw);
        await routeUser(user);
      } catch(e) {
        let msg = 'Invalid email or password.';
        if (e.code === 'auth/too-many-requests') msg = 'Too many attempts. Try again later.';
        showErr(msg);
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    };

    function showErr(msg) {
      const err = document.getElementById('errorMsg');
      err.textContent = msg; err.style.display = 'block';
    }
  </script>
</body>
</html>
