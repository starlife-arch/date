<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat — DateVault</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div class="page-loader" id="loader"><div class="loader-logo">DateVault</div></div>

  <!-- Conversations List -->
  <div id="convView" class="app-shell" style="display:none;">
    <div class="topbar">
      <div class="topbar-title">Messages</div>
    </div>
    <div class="section-tabs" style="margin:0 1rem 1rem;">
      <button class="tab-btn active" id="tabMatches" onclick="setTab('matches')">Matches</button>
      <button class="tab-btn" id="tabConvs" onclick="setTab('convs')">Conversations</button>
    </div>
    <div id="matchStrip" class="photo-strip" style="margin-bottom:1rem;"></div>
    <div class="chat-list" id="convList"></div>
    <div id="noConvs" style="display:none;text-align:center;padding:3rem 1rem;color:var(--muted);">
      <div style="font-size:2rem;margin-bottom:0.75rem;">◈</div>
      <p>No conversations yet. Start swiping to match!</p>
    </div>
  </div>

  <!-- Chat Window -->
  <div id="chatView" class="chat-window" style="display:none;">
    <div class="chat-header">
      <button onclick="backToList()" style="background:none;border:none;color:var(--muted);cursor:pointer;padding:0;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </button>
      <img class="chat-header-avatar" id="chatAvatar" src="" alt=""/>
      <div>
        <div class="chat-header-name" id="chatName"></div>
        <div class="chat-header-status" id="chatStatus">Active member</div>
      </div>
      <div style="margin-left:auto;display:flex;gap:0.5rem;">
        <button onclick="reportUser()" style="background:none;border:none;color:var(--muted);cursor:pointer;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </button>
        <button onclick="blockUser()" style="background:none;border:none;color:var(--danger);cursor:pointer;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
        </button>
      </div>
    </div>
    <div class="chat-messages" id="messages"></div>
    <div class="chat-input-bar">
      <button onclick="document.getElementById('imgInput').click()" style="background:none;border:none;color:var(--muted);cursor:pointer;flex-shrink:0;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
      </button>
      <input type="file" id="imgInput" accept="image/*" style="display:none;" onchange="sendImage(this)"/>
      <textarea id="msgInput" placeholder="Type a message..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" onclick="sendMsg()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>
      </button>
    </div>
  </div>

  <!-- Bottom Nav (shown only in conv view) -->
  <nav class="bottom-nav" id="bottomNav">
    <a class="nav-item" href="dashboard.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/></svg>
      Discover
    </a>
    <a class="nav-item" href="explore.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Explore
    </a>
    <a class="nav-item" href="likes.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
      Likes
    </a>
    <a class="nav-item active" href="chat.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      Chat
    </a>
    <a class="nav-item" href="profile.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profile
    </a>
  </nav>

  <div id="toast" class="toast"></div>

  <script type="module">
    import { requireMember } from "./js/auth.js";
    import { db } from "./js/auth.js";
    import { sendMessage, listenMessages, fetchConversations } from "./js/chat.js";
    import { uploadToCloudinary } from "./js/verification.js";
    import { doc, setDoc, serverTimestamp, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    let myUser, myProfile, theirUID, unsubMessages = null;
    const params = new URLSearchParams(location.search);
    const openUID = params.get('uid');

    async function init() {
      const { user, profile } = await requireMember();
      myUser = user; myProfile = profile;
      document.getElementById('loader').classList.add('hidden');
      if (openUID) {
        await openChat(openUID);
      } else {
        showConvList();
        await loadConversations();
      }
    }

    async function loadConversations() {
      const convs = await fetchConversations(myUser.uid);
      const list = document.getElementById('convList');
      const strip = document.getElementById('matchStrip');
      list.innerHTML = ''; strip.innerHTML = '';

      if (convs.length === 0) { document.getElementById('noConvs').style.display = 'block'; return; }
      document.getElementById('noConvs').style.display = 'none';

      convs.forEach(c => {
        // Match strip (recent matches)
        if (!c.lastMessage) {
          const btn = document.createElement('button');
          btn.style.cssText = 'background:none;border:none;cursor:pointer;flex-shrink:0;text-align:center;';
          const photo = c.theirPhoto || '';
          btn.innerHTML = `
            <div style="position:relative;width:64px;">
              <div style="width:64px;height:64px;border-radius:50%;overflow:hidden;border:2px solid var(--gold);background:var(--surface2);">
                ${photo ? `<img src="${photo}" style="width:100%;height:100%;object-fit:cover;"/>` : `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:22px;">👤</div>`}
              </div>
              <div style="font-size:11px;color:var(--muted);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:64px;">${c.theirName}</div>
            </div>
          `;
          btn.onclick = () => openChat(c.theirUID);
          strip.appendChild(btn);
        }

        // Conversation item
        const item = document.createElement('div');
        item.className = 'chat-item';
        const photo = c.theirPhoto;
        const time = c.lastMessageAt ? formatTime(c.lastMessageAt.toDate ? c.lastMessageAt.toDate() : new Date()) : '';
        item.innerHTML = `
          ${photo ? `<img class="chat-avatar" src="${photo}" alt="${c.theirName}"/>` : `<div class="chat-avatar-placeholder">👤</div>`}
          <div class="chat-info">
            <div class="chat-name">${c.theirName}</div>
            <div class="chat-preview">${c.lastMessage || 'You matched! Say hello.'}</div>
          </div>
          <div class="chat-meta">
            <div class="chat-time">${time}</div>
            ${c.hasUnread ? '<div class="unread-dot"></div>' : ''}
          </div>
        `;
        item.onclick = () => openChat(c.theirUID);
        list.appendChild(item);
      });
    }

    async function openChat(uid) {
      theirUID = uid;
      showChatWindow();
      // Load their profile info
      const { getDoc } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
      const { doc: docFn } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
      const snap = await getDoc(docFn(db, 'users', uid));
      const them = snap.exists() ? snap.data() : {};
      document.getElementById('chatName').textContent = them.displayName || them.name || 'Member';
      const avatar = document.getElementById('chatAvatar');
      if (them.photos && them.photos[0]) avatar.src = them.photos[0];
      else avatar.src = 'https://via.placeholder.com/40x40/131929/6b7a99?text=';

      if (unsubMessages) unsubMessages();
      unsubMessages = listenMessages(myUser.uid, uid, renderMessages);
    }

    function renderMessages(msgs) {
      const container = document.getElementById('messages');
      container.innerHTML = '';
      msgs.forEach(m => {
        const isOut = m.senderUID === myUser.uid;
        const wrap = document.createElement('div');
        wrap.style.display = 'flex';
        wrap.style.flexDirection = 'column';
        const bubble = document.createElement('div');
        bubble.className = 'msg ' + (isOut ? 'msg-out' : 'msg-in');
        if (m.imageURL) {
          bubble.innerHTML = `<img src="${m.imageURL}" style="max-width:200px;border-radius:12px;"/>`;
        } else {
          bubble.textContent = m.text;
        }
        const time = document.createElement('div');
        time.className = 'msg-time';
        time.textContent = m.sentAt ? formatTime(m.sentAt.toDate ? m.sentAt.toDate() : new Date()) : '';
        wrap.appendChild(bubble); wrap.appendChild(time);
        container.appendChild(wrap);
      });
      container.scrollTop = container.scrollHeight;
    }

    window.sendMsg = async function() {
      const input = document.getElementById('msgInput');
      const text = input.value.trim();
      if (!text || !theirUID) return;
      input.value = ''; autoResize(input);
      await sendMessage(myUser.uid, theirUID, text);
    };

    window.sendImage = async function(input) {
      const file = input.files[0];
      if (!file || !theirUID) return;
      showToast('Uploading image...');
      try {
        const url = await uploadToCloudinary(file, 'datevault/chat');
        await sendMessage(myUser.uid, theirUID, null, url);
      } catch(e) { showToast('Upload failed'); }
    };

    window.handleKey = function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
    };

    window.autoResize = function(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    };

    window.reportUser = async function() {
      const reason = prompt('Reason for reporting this user:');
      if (!reason) return;
      await setDoc(doc(db, 'reports', `${myUser.uid}_${theirUID}_${Date.now()}`), {
        reporterUID: myUser.uid,
        reportedUID: theirUID,
        reason,
        reportedAt: serverTimestamp(),
        status: 'pending'
      });
      showToast('Report submitted. Thank you.');
    };

    window.blockUser = async function() {
      if (!confirm('Block this user? You will no longer see each other.')) return;
      await setDoc(doc(db, 'users', myUser.uid, 'blocked', theirUID), { blockedAt: serverTimestamp() });
      showToast('User blocked.');
      backToList();
    };

    window.backToList = function() {
      if (unsubMessages) { unsubMessages(); unsubMessages = null; }
      showConvList();
      history.replaceState({}, '', 'chat.html');
      loadConversations();
    };

    window.setTab = function(tab) {
      document.getElementById('tabMatches').classList.toggle('active', tab === 'matches');
      document.getElementById('tabConvs').classList.toggle('active', tab === 'convs');
      document.getElementById('matchStrip').style.display = tab === 'matches' ? 'flex' : 'none';
      document.getElementById('convList').style.display = tab === 'convs' ? 'flex' : 'none';
    };

    function showConvList() {
      document.getElementById('convView').style.display = 'block';
      document.getElementById('chatView').style.display = 'none';
      document.getElementById('bottomNav').style.display = 'flex';
    }

    function showChatWindow() {
      document.getElementById('convView').style.display = 'none';
      document.getElementById('chatView').style.display = 'flex';
      document.getElementById('bottomNav').style.display = 'none';
    }

    function formatTime(date) {
      const now = new Date();
      const d = date instanceof Date ? date : new Date(date);
      const diff = (now - d) / 1000;
      if (diff < 60) return 'Just now';
      if (diff < 3600) return Math.floor(diff/60) + 'm';
      if (diff < 86400) return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
      return d.toLocaleDateString([], {month:'short',day:'numeric'});
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    init().catch(console.error);
  </script>
</body>
</html>
