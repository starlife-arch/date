<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Apply — DateVault</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div class="page-loader" id="loader"><div class="loader-logo">DateVault</div></div>
  <div class="auth-shell">
    <div class="auth-card fade-up">
      <a href="index.html" style="display:flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;margin-bottom:1.5rem;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Back
      </a>
      <div class="auth-logo">DateVault</div>
      <p class="auth-tagline">Create your account to begin your application</p>
      <div id="errorMsg" style="display:none;background:rgba(224,92,110,0.1);border:1px solid rgba(224,92,110,0.3);color:var(--danger);padding:0.75rem 1rem;border-radius:12px;font-size:13px;margin-bottom:1rem;"></div>
      <div class="field-group">
        <div>
          <label>Email Address</label>
          <input type="email" id="email" placeholder="your@email.com"/>
        </div>
        <div>
          <label>Password</label>
          <input type="password" id="password" placeholder="Minimum 8 characters"/>
        </div>
        <div>
          <label>Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Repeat your password"/>
        </div>
        <button class="btn btn-gold btn-full" id="signupBtn" onclick="doSignup()">Create Account</button>
      </div>
      <p class="auth-footer">Already have an account? <a href="login.html">Sign in</a></p>
    </div>
  </div>

  <script type="module">
    import { signup, auth, onAuthStateChanged, routeUser } from "./js/auth.js";

    onAuthStateChanged(auth, user => {
      if (user) routeUser(user);
    });

    document.getElementById('loader').classList.add('hidden');

    window.doSignup = async function() {
      const email = document.getElementById('email').value.trim();
      const pw = document.getElementById('password').value;
      const cpw = document.getElementById('confirmPassword').value;
      const btn = document.getElementById('signupBtn');
      const err = document.getElementById('errorMsg');

      err.style.display = 'none';
      if (!email || !pw) { showErr('Please fill in all fields.'); return; }
      if (pw.length < 8) { showErr('Password must be at least 8 characters.'); return; }
      if (pw !== cpw) { showErr('Passwords do not match.'); return; }

      btn.disabled = true; btn.textContent = 'Creating account...';
      try {
        await signup(email, pw);
        window.location.href = 'verification.html';
      } catch(e) {
        let msg = e.message;
        if (e.code === 'auth/email-already-in-use') msg = 'This email is already registered.';
        if (e.code === 'auth/invalid-email') msg = 'Please enter a valid email address.';
        showErr(msg);
        btn.disabled = false; btn.textContent = 'Create Account';
      }
    };

    function showErr(msg) {
      const err = document.getElementById('errorMsg');
      err.textContent = msg; err.style.display = 'block';
    }
  </script>
</body>
</html>
