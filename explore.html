<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Explore — DateVault</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div class="page-loader" id="loader"><div class="loader-logo">DateVault</div></div>
  <div class="app-shell">
    <div class="topbar">
      <div class="topbar-title">Explore</div>
    </div>
    <div style="padding:0 1rem 1rem;">
      <div style="position:relative;margin-bottom:1rem;">
        <input type="text" id="searchInput" placeholder="Search by name or country..." oninput="filterProfiles()" style="padding-left:2.5rem;"/>
        <svg style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
    </div>
    <div class="profile-grid" id="exploreGrid"></div>
    <div id="emptyMsg" style="display:none;text-align:center;padding:2rem;color:var(--muted);">No members found.</div>
  </div>

  <nav class="bottom-nav">
    <a class="nav-item" href="dashboard.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/></svg>
      Discover
    </a>
    <a class="nav-item active" href="explore.html">
      <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Explore
    </a>
    <a class="nav-item" href="likes.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
      Likes
    </a>
    <a class="nav-item" href="chat.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      Chat
    </a>
    <a class="nav-item" href="profile.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profile
    </a>
  </nav>

  <script type="module">
    import { requireMember, db } from "./js/auth.js";
    import { collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    let allProfiles = [], myUser;

    async function init() {
      const { user } = await requireMember();
      myUser = user;
      document.getElementById('loader').classList.add('hidden');
      const snap = await getDocs(query(collection(db, 'users'), where('status','==','active_member'), where('banned','==',false)));
      allProfiles = snap.docs.filter(d => d.id !== myUser.uid).map(d => ({ id: d.id, ...d.data() }));
      renderGrid(allProfiles);
    }

    function renderGrid(list) {
      const grid = document.getElementById('exploreGrid');
      const empty = document.getElementById('emptyMsg');
      grid.innerHTML = '';
      if (list.length === 0) { empty.style.display = 'block'; return; }
      empty.style.display = 'none';
      list.forEach(p => {
        const photo = p.photos && p.photos[0] ? p.photos[0] : '';
        const age = p.dob ? Math.floor((Date.now() - new Date(p.dob)) / 31557600000) : '';
        const tile = document.createElement('div');
        tile.className = 'profile-tile';
        tile.innerHTML = `
          ${photo ? `<img src="${photo}" alt="${p.displayName}" loading="lazy"/>` : `<div style="width:100%;height:100%;background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:2rem;">👤</div>`}
          <div class="tile-info">
            <div class="tile-name">${p.displayName || 'Member'}${age ? ', '+age : ''}</div>
            <div class="tile-meta">${p.city || ''}${p.city&&p.country?', ':''}${p.country||''}</div>
          </div>
        `;
        grid.appendChild(tile);
      });
    }

    window.filterProfiles = function() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const filtered = q ? allProfiles.filter(p =>
        (p.displayName||'').toLowerCase().includes(q) ||
        (p.country||'').toLowerCase().includes(q) ||
        (p.city||'').toLowerCase().includes(q)
      ) : allProfiles;
      renderGrid(filtered);
    };

    init().catch(console.error);
  </script>
</body>
</html>
