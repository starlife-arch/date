<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Account Suspended — DateVault</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div class="status-page">
    <div class="auth-logo" style="font-size:1.25rem;margin-bottom:0.5rem;">DateVault</div>
    <div style="color:var(--danger);font-size:3rem;margin-bottom:0.5rem;">◉</div>
    <h2>Account Suspended</h2>
    <p>Your account has been suspended for violating our community guidelines. If you believe this is an error, please contact our support team.</p>
    <a class="btn btn-outline" href="mailto:support@datevault.com">Contact Support</a>
    <button class="btn btn-outline btn-sm" onclick="doLogout()">Sign Out</button>
  </div>
  <script type="module">
    window.doLogout = async function() {
      const { logout } = await import('./js/auth.js');
      logout();
    };
  </script>
</body>
</html>
