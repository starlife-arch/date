<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — DateVault</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div class="page-loader" id="loader"><div class="loader-logo">DateVault</div></div>
  <div class="admin-layout">

    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <div class="admin-logo">DateVault</div>
      <button class="sidebar-item active" id="nav-overview" onclick="showSection('overview')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Overview
      </button>
      <button class="sidebar-item" id="nav-pending" onclick="showSection('pending')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
        Pending Review
        <span class="sidebar-count" id="pendingCount">0</span>
      </button>
      <button class="sidebar-item" id="nav-members" onclick="showSection('members')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        All Members
      </button>
      <button class="sidebar-item" id="nav-reports" onclick="showSection('reports')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Reports
        <span class="sidebar-count" id="reportsCount">0</span>
      </button>
      <button class="sidebar-item" id="nav-calls" onclick="showSection('calls')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23,7 16,12 23,17"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
        Video Calls
      </button>
      <div style="margin-top:auto;padding-top:1rem;border-top:1px solid var(--border);">
        <button class="sidebar-item" onclick="doLogout()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sign Out
        </button>
      </div>
    </aside>

    <!-- Main -->
    <main class="admin-main">

      <!-- OVERVIEW -->
      <section id="section-overview">
        <div class="admin-header">
          <h1 class="admin-title">Dashboard Overview</h1>
          <button class="btn btn-outline btn-sm" onclick="refreshAll()">Refresh</button>
        </div>
        <div class="stats-grid" id="overviewStats"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
          <div>
            <h3 style="font-size:1rem;margin-bottom:0.75rem;color:var(--muted);">Recent Applications</h3>
            <div id="recentApps"></div>
          </div>
          <div>
            <h3 style="font-size:1rem;margin-bottom:0.75rem;color:var(--muted);">Recent Reports</h3>
            <div id="recentReports"></div>
          </div>
        </div>
      </section>

      <!-- PENDING REVIEW -->
      <section id="section-pending" style="display:none;">
        <div class="admin-header">
          <h1 class="admin-title">Pending Review</h1>
        </div>
        <div class="user-table" id="pendingList"></div>
        <div id="pendingEmpty" style="display:none;text-align:center;padding:3rem;color:var(--muted);">No pending applications.</div>
      </section>

      <!-- ALL MEMBERS -->
      <section id="section-members" style="display:none;">
        <div class="admin-header">
          <h1 class="admin-title">All Members</h1>
        </div>
        <div class="search-bar">
          <input type="text" id="memberSearch" placeholder="Search by name, email, or Member ID..." oninput="filterMembers()"/>
          <select id="statusFilter" onchange="filterMembers()" style="width:auto;white-space:nowrap;min-width:160px;">
            <option value="">All Statuses</option>
            <option value="active_member">Active</option>
            <option value="pending_admin_review">Pending Review</option>
            <option value="approved_pending_invite">Awaiting Invite</option>
            <option value="approved_pending_payment">Awaiting Payment</option>
            <option value="rejected">Rejected</option>
          </select>
        </div>
        <div class="user-table" id="membersList"></div>
      </section>

      <!-- REPORTS -->
      <section id="section-reports" style="display:none;">
        <div class="admin-header">
          <h1 class="admin-title">Reports</h1>
        </div>
        <div id="reportsList"></div>
        <div id="reportsEmpty" style="display:none;text-align:center;padding:3rem;color:var(--muted);">No pending reports.</div>
      </section>

      <!-- VIDEO CALLS -->
      <section id="section-calls" style="display:none;">
        <div class="admin-header">
          <h1 class="admin-title">Video Verification Calls</h1>
        </div>
        <div class="glass-card" style="margin-bottom:1.5rem;">
          <div class="modal-title" style="margin-bottom:1rem;">Schedule a Call</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
            <div><label>User UID or Member ID</label><input type="text" id="callUID" placeholder="Enter UID or MBR-XXXXXX"/></div>
            <div><label>Google Meet Link</label><input type="url" id="callMeet" placeholder="https://meet.google.com/..."/></div>
            <div><label>Date &amp; Time</label><input type="datetime-local" id="callDateTime"/></div>
            <div>
              <label>Send via</label>
              <select id="callContact">
                <option value="email">Email</option>
                <option value="whatsapp">WhatsApp</option>
              </select>
            </div>
          </div>
          <button class="btn btn-gold" style="margin-top:1rem;" onclick="scheduleCallNow()">Schedule Call</button>
        </div>
        <h3 style="font-size:1rem;margin-bottom:0.75rem;color:var(--muted);">Upcoming Calls</h3>
        <div id="callsList"></div>
      </section>

    </main>
  </div>

  <!-- Approve/Override Modal -->
  <div class="modal-overlay" id="overrideModal">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title" id="overrideTitle">Admin Override</div>
      <div class="stack" id="overrideContent"></div>
    </div>
  </div>

  <div id="toast" class="toast" style="bottom:1rem;"></div>

  <script type="module">
    import { requireAdmin, logout, db } from "./js/auth.js";
    import {
      approveUser, rejectUser, banUser, unbanUser,
      grantAccess, setExpiry, fetchAllUsers, fetchReports,
      fetchVerificationCalls, scheduleCall, resolveReport
    } from "./js/admin.js";
    import { collection, getDocs, query, where, getDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    let allUsers = [], allReports = [], allCalls = [];

    async function init() {
      await requireAdmin();
      document.getElementById('loader').classList.add('hidden');
      await refreshAll();
    }

    window.refreshAll = async function() {
      allUsers = await fetchAllUsers();
      allReports = await fetchReports();
      allCalls = await fetchVerificationCalls();
      renderOverview();
      renderPending();
      renderMembers(allUsers);
      renderReports();
      renderCalls();
      document.getElementById('pendingCount').textContent = allUsers.filter(u => u.status === 'pending_admin_review').length || '';
      document.getElementById('reportsCount').textContent = allReports.length || '';
    };

    function renderOverview() {
      const active = allUsers.filter(u => u.status === 'active_member').length;
      const pending = allUsers.filter(u => u.status === 'pending_admin_review').length;
      const banned = allUsers.filter(u => u.banned).length;
      const total = allUsers.length;
      document.getElementById('overviewStats').innerHTML = `
        <div class="stat-tile"><div class="num">${total}</div><div class="lbl">Total Users</div></div>
        <div class="stat-tile"><div class="num" style="color:var(--success);">${active}</div><div class="lbl">Active Members</div></div>
        <div class="stat-tile"><div class="num" style="color:#ffaa00;">${pending}</div><div class="lbl">Pending Review</div></div>
        <div class="stat-tile"><div class="num" style="color:var(--danger);">${allReports.length}</div><div class="lbl">Open Reports</div></div>
        <div class="stat-tile"><div class="num" style="color:var(--danger);">${banned}</div><div class="lbl">Banned Users</div></div>
        <div class="stat-tile"><div class="num">${allCalls.length}</div><div class="lbl">Video Calls</div></div>
      `;
      // Recent apps
      const ra = document.getElementById('recentApps');
      const pending5 = allUsers.filter(u=>u.status==='pending_admin_review').slice(0,5);
      ra.innerHTML = pending5.length ? pending5.map(u => `
        <div style="padding:0.75rem;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:0.5rem;cursor:pointer;" onclick="showSection('pending')">
          <div style="font-weight:600;font-size:14px;">${u.displayName||u.name||u.email}</div>
          <div style="font-size:12px;color:var(--muted);">${u.country||''} · ${u.memberId||''}</div>
        </div>
      `).join('') : '<p class="muted" style="font-size:13px;">No pending applications</p>';

      const rr = document.getElementById('recentReports');
      const rep3 = allReports.slice(0,3);
      rr.innerHTML = rep3.length ? rep3.map(r => `
        <div style="padding:0.75rem;background:rgba(224,92,110,0.05);border:1px solid rgba(224,92,110,0.15);border-radius:12px;margin-bottom:0.5rem;cursor:pointer;" onclick="showSection('reports')">
          <div class="report-reason">${r.reason}</div>
          <div style="font-size:12px;color:var(--muted);">Reporter: ${r.reporterUID.slice(0,8)}...</div>
        </div>
      `).join('') : '<p class="muted" style="font-size:13px;">No open reports</p>';
    }

    function renderPending() {
      const list = document.getElementById('pendingList');
      const empty = document.getElementById('pendingEmpty');
      const pending = allUsers.filter(u => u.status === 'pending_admin_review');
      if (pending.length === 0) { list.innerHTML=''; empty.style.display='block'; return; }
      empty.style.display = 'none';
      list.innerHTML = pending.map(u => userCard(u, true)).join('');
    }

    window.filterMembers = function() {
      const q = document.getElementById('memberSearch').value.toLowerCase();
      const status = document.getElementById('statusFilter').value;
      let filtered = allUsers;
      if (q) filtered = filtered.filter(u =>
        (u.displayName||'').toLowerCase().includes(q) ||
        (u.name||'').toLowerCase().includes(q) ||
        (u.email||'').toLowerCase().includes(q) ||
        (u.memberId||'').toLowerCase().includes(q)
      );
      if (status) filtered = filtered.filter(u => u.status === status);
      renderMembers(filtered);
    };

    function renderMembers(list) {
      document.getElementById('membersList').innerHTML = list.map(u => userCard(u, false)).join('') || '<p class="muted" style="padding:1rem;">No users found.</p>';
    }

    function userCard(u, showVerification) {
      const statusColors = {
        active_member: 'status-active',
        pending_admin_review: 'status-pending',
        rejected: 'status-rejected',
        approved_pending_invite: 'status-gold',
        approved_pending_payment: 'status-gold'
      };
      const photo = u.photos && u.photos[0] ? `<img src="${u.photos[0]}" style="width:48px;height:48px;border-radius:50%;object-fit:cover;" alt=""/>` : `<div class="admin-avatar">👤</div>`;
      return `
        <div class="admin-user-card" id="card-${u.id}">
          ${photo}
          <div class="admin-user-info">
            <div class="admin-user-name">${u.displayName||u.name||'Unknown'} ${u.banned ? '<span style="color:var(--danger);font-size:12px;">[BANNED]</span>' : ''}</div>
            <div class="admin-user-meta">${u.email} · ${u.memberId||'No ID'} · ${u.country||'—'}</div>
            <div style="margin-top:4px;">
              <span class="status-badge ${statusColors[u.status]||'status-pending'}" style="font-size:11px;">${u.status?.replace(/_/g,' ')||'unknown'}</span>
              ${u.paid ? '<span class="status-badge status-active" style="font-size:11px;margin-left:4px;">PAID</span>' : ''}
              ${u.adminOverride ? '<span class="status-badge status-gold" style="font-size:11px;margin-left:4px;">ADMIN OVERRIDE</span>' : ''}
            </div>
            ${showVerification && u.status === 'pending_admin_review' ? `
              <div class="verification-detail">
                <strong>Legal Name:</strong> ${u.name||'—'}<br/>
                <strong>Age/DOB:</strong> ${u.dob||'—'}<br/>
                <strong>Gender:</strong> ${u.gender||'—'}<br/>
                <strong>Country:</strong> ${u.country||'—'} · <strong>City:</strong> ${u.city||'—'}<br/>
                <strong>Phone:</strong> ${u.phone||'—'}<br/>
                <strong>Video Availability:</strong> ${u.videoAvailability||'Not specified'}<br/>
                <strong>Bio:</strong> ${u.bio||'—'}<br/>
                <strong>Interests:</strong> ${(u.interests||[]).join(', ')||'—'}
                ${u.idPhotoURL ? `<br/><strong>ID Photo:</strong><br/><a href="${u.idPhotoURL}" target="_blank"><img src="${u.idPhotoURL}" class="id-photo"/></a>` : ''}
                ${u.selfieURL ? `<br/><strong>Selfie:</strong><br/><a href="${u.selfieURL}" target="_blank"><img src="${u.selfieURL}" class="id-photo"/></a>` : ''}
              </div>
            ` : ''}
            <div class="admin-actions">
              ${u.status === 'pending_admin_review' ? `
                <button class="btn btn-sm btn-gold" onclick="doApprove('${u.id}')">Approve</button>
                <button class="btn btn-sm btn-danger" onclick="doReject('${u.id}')">Reject</button>
              ` : ''}
              ${u.status !== 'active_member' && u.status !== 'pending_admin_review' ? `
                <button class="btn btn-sm btn-gold" onclick="doGrantAccess('${u.id}')">Grant Access</button>
              ` : ''}
              ${u.status === 'active_member' ? `
                <button class="btn btn-sm" style="background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--muted);" onclick="doSetExpiry('${u.id}')">Set Expiry</button>
              ` : ''}
              ${u.banned ? `
                <button class="btn btn-sm btn-outline" onclick="doUnban('${u.id}')">Unban</button>
              ` : `
                <button class="btn btn-sm btn-danger" onclick="doBan('${u.id}')">Ban</button>
              `}
            </div>
          </div>
        </div>
      `;
    }

    window.doApprove = async function(uid) {
      if (!confirm('Approve this user and generate their invite code?')) return;
      const code = await approveUser(uid);
      showToast(`Approved. Invite code: ${code}`, 'success');
      await refreshAll();
    };

    window.doReject = async function(uid) {
      const reason = prompt('Reason for rejection (optional):') || '';
      await rejectUser(uid, reason);
      showToast('User rejected.');
      await refreshAll();
    };

    window.doGrantAccess = async function(uid) {
      if (!confirm('Grant full access to this user? This bypasses invite and payment.')) return;
      await grantAccess(uid);
      showToast('Access granted.', 'success');
      await refreshAll();
    };

    window.doBan = async function(uid) {
      if (!confirm('Ban this user? They will be blocked from the platform.')) return;
      await banUser(uid);
      showToast('User banned.', 'error');
      await refreshAll();
    };

    window.doUnban = async function(uid) {
      await unbanUser(uid);
      showToast('User unbanned.', 'success');
      await refreshAll();
    };

    window.doSetExpiry = async function(uid) {
      const date = prompt('Set access expiry date (YYYY-MM-DD):');
      if (!date) return;
      await setExpiry(uid, date);
      showToast('Expiry set.');
      await refreshAll();
    };

    function renderReports() {
      const list = document.getElementById('reportsList');
      const empty = document.getElementById('reportsEmpty');
      if (allReports.length === 0) { list.innerHTML=''; empty.style.display='block'; return; }
      empty.style.display='none';
      list.innerHTML = allReports.map(r => {
        const reporter = allUsers.find(u=>u.id===r.reporterUID);
        const reported = allUsers.find(u=>u.id===r.reportedUID);
        return `
          <div class="report-card">
            <div class="report-reason">${r.reason}</div>
            <div style="font-size:13px;margin-bottom:0.5rem;">
              <span style="color:var(--muted);">Reporter:</span> ${reporter?.displayName||reporter?.email||r.reporterUID}
              &nbsp;→&nbsp;
              <span style="color:var(--muted);">Reported:</span> ${reported?.displayName||reported?.email||r.reportedUID}
            </div>
            <div class="admin-actions">
              <button class="btn btn-sm btn-danger" onclick="doBan('${r.reportedUID}')">Ban Reported User</button>
              <button class="btn btn-sm btn-outline" onclick="doResolveReport('${r.id}')">Mark Resolved</button>
            </div>
          </div>
        `;
      }).join('');
    }

    window.doResolveReport = async function(id) {
      await resolveReport(id);
      showToast('Report resolved.', 'success');
      allReports = await fetchReports();
      renderReports();
    };

    function renderCalls() {
      const list = document.getElementById('callsList');
      if (allCalls.length === 0) { list.innerHTML='<p class="muted" style="font-size:13px;">No calls scheduled yet.</p>'; return; }
      list.innerHTML = allCalls.map(c => `
        <div class="call-card">
          <div style="font-weight:600;margin-bottom:4px;">${c.dateTime || '—'}</div>
          <div style="font-size:13px;color:var(--muted);margin-bottom:0.5rem;">UID: ${c.uid} · Via: ${c.contactMethod}</div>
          <a href="${c.meetLink}" target="_blank" style="color:var(--gold);font-size:13px;">${c.meetLink}</a>
          <div class="status-badge ${c.status==='scheduled'?'status-pending':'status-active'}" style="font-size:11px;margin-top:0.5rem;display:inline-flex;">${c.status}</div>
        </div>
      `).join('');
    }

    window.scheduleCallNow = async function() {
      const uid = document.getElementById('callUID').value.trim();
      const meet = document.getElementById('callMeet').value.trim();
      const dt = document.getElementById('callDateTime').value;
      const contact = document.getElementById('callContact').value;
      if (!uid || !meet || !dt) { showToast('Fill in all fields.', 'error'); return; }
      await scheduleCall(uid, meet, dt, contact);
      showToast('Call scheduled!', 'success');
      allCalls = await fetchVerificationCalls();
      renderCalls();
    };

    window.showSection = function(name) {
      ['overview','pending','members','reports','calls'].forEach(s => {
        document.getElementById('section-'+s).style.display = s === name ? 'block' : 'none';
        document.getElementById('nav-'+s).classList.toggle('active', s === name);
      });
    };

    window.doLogout = function() { logout(); };

    function showToast(msg, type='') {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = 'toast show ' + type;
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    init().catch(console.error);
  </script>
</body>
</html>
